name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: npm, GitHub, and MCP Registry
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Require an OIDC-capable npm CLI
        run: |
          npm --version
          node -e "const [major, minor, patch] = require('child_process').execFileSync('npm', ['--version'], { encoding: 'utf8' }).trim().split('.').map(Number); if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) { throw new Error('npm 11.5.1 or newer is required for Trusted Publishing'); }"

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Verify release metadata
        run: npm run release:check -- "${GITHUB_REF_NAME}"

      - name: Validate official MCP Registry metadata
        run: |
          curl --fail --silent --show-error --request POST --header 'Content-Type: application/json' --data-binary @server.json https://registry.modelcontextprotocol.io/v0.1/validate --output mcp-validation.json
          jq --exit-status '.valid == true and (.issues | length) == 0' mcp-validation.json

      - name: Require the tagged commit to be on main
        run: |
          git fetch origin main --no-tags
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

      - name: Run the complete release gate
        run: npm run verify

      - name: Inspect npm publication state
        id: npm-state
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "evidrift@${VERSION}" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo 'exists=true' >> "${GITHUB_OUTPUT}"
          else
            echo 'exists=false' >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish npm package with OIDC provenance
        if: steps.npm-state.outputs.exists != 'true'
        run: npm publish

      - name: Read npm version back
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in {1..12}; do
            PUBLISHED="$(npm view "evidrift@${VERSION}" version --registry=https://registry.npmjs.org/ 2>/dev/null || true)"
            if [ "${PUBLISHED}" = "${VERSION}" ]; then
              echo "npm registry returned evidrift@${PUBLISHED}"
              exit 0
            fi
            sleep 5
          done
          echo "npm registry did not return evidrift@${VERSION}" >&2
          exit 1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release ${GITHUB_REF_NAME} already exists"
          else
            gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --title "Evidrift ${GITHUB_REF_NAME}"
          fi

      - name: Inspect MCP Registry publication state
        id: mcp-state
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://registry.modelcontextprotocol.io/v0.1/servers/io.github.bm1016bm-svg%2Fevidrift/versions/${VERSION}"
          if curl --fail --silent --show-error "${URL}" >/dev/null; then
            echo 'exists=true' >> "${GITHUB_OUTPUT}"
          else
            echo 'exists=false' >> "${GITHUB_OUTPUT}"
          fi

      - name: Install pinned MCP publisher
        if: steps.mcp-state.outputs.exists != 'true'
        run: |
          curl --fail --location --show-error --output mcp-publisher.tar.gz https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz
          echo 'ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  mcp-publisher.tar.gz' | sha256sum --check
          tar --extract --gzip --file mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher

      - name: Publish official MCP Registry metadata
        if: steps.mcp-state.outputs.exists != 'true'
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

      - name: Read MCP Registry version back
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://registry.modelcontextprotocol.io/v0.1/servers/io.github.bm1016bm-svg%2Fevidrift/versions/${VERSION}"
          curl --fail --silent --show-error "${URL}" --output mcp-readback.json
          jq --exit-status --arg name 'io.github.bm1016bm-svg/evidrift' --arg version "${VERSION}" '.server.name == $name and .server.version == $version and .server.packages[0].identifier == "evidrift" and .server.packages[0].version == $version' mcp-readback.json
